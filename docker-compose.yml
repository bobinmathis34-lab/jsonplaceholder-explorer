services:
  backend:
    build: ./backend
    environment:
      - PORT=4000
      - UPSTREAM_BASE_URL=https://jsonplaceholder.typicode.com
      - CACHE_TTL_MS=300000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    depends_on:
      - backend
    ports:
      - "8080:80"
