server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: route everything to index.html so client-side routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the backend service (compose network name: backend).
  location /api/ {
    proxy_pass http://backend:4000/;
    proxy_set_header Host $host;
  }
}
